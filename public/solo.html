<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Parcours Brevet</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #questionImg {
      display: none;
      max-width: 90%;
      margin: 10px auto 0 auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Parcours Brevet 🧠</h1>
  <div id="stats">
    Niveau : <span id="levelDisplay">1</span> / 600<br>
    Vies : <span id="livesDisplay">❤️ 3</span>
  </div>

  <div id="questionBox">
    <h3 id="themeTitle">Thème</h3>
    <p id="questionText">Question ici</p>
    <!-- Image de la question -->
    <img id="questionImg" src="" alt="Illustration question">
    <input type="text" id="answerInput" placeholder="Ta réponse">
    <button id="sendAnswerBtn">Envoyer</button>
  </div>

  <div id="resultBox" style="display:none;">
    <h2 id="resultText"></h2>
  </div>

  <script src="solo.js"></script>
</body>
</html>
