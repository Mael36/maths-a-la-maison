<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maths à la Maison – Jeu en ligne</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="menu">
    <h1>Maths à la Maison</h1>
    <input type="text" id="playerName" placeholder="Ton prénom" value="Joueur" />
    <button onclick="createGame()">Créer une partie</button>
    <div>OU</div>
    <input type="text" id="roomCode" placeholder="Code de la salle" maxlength="4" />
    <button onclick="joinGame()">Rejoindre</button>
    <div id="codeDisplay"></div>
  </div>

  <div id="game" style="display:none;">
    <div id="board">
      <img src="assets/plateau.png" alt="Plateau" id="plateau" />
      <div id="pions"></div>
      <div id="flashTimer">30s</div>
    </div>

    <div id="sidebar">
      <h2>Joueurs</h2>
      <div id="playerList"></div>
      <button id="rollBtn" onclick="rollDice()" style="display:none;">Lancer le dé</button>
      <div id="questionBox" style="display:none;">
        <h3 id="theme"></h3>
        <p id="questionText"></p>
        <input type="text" id="answerInput" placeholder="Ta réponse" />
        <button onclick="sendAnswer()">Valider</button>
      </div>
      <div id="results"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
