<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maths à la Maison – Jeu en ligne</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="menu">
    <h1>Maths à la Maison</h1>
    <input id="playerName" type="text" placeholder="Ton prénom" value="Joueur">
    <button onclick="createRoom()">Créer une partie</button>
    <div style="margin:20px;">OU</div>
    <input id="roomCode" type="text" placeholder="Code (ex: ABCD)" maxlength="4" style="text-transform:uppercase;">
    <button onclick="joinRoom()">Rejoindre</button>
    <div id="status"></div>
  </div>

  <div id="game" style="display:none;">
    <h2 id="roomDisplay"></h2>
    
    <div id="board">
      <img src="assets/plateau.png" id="plateau" alt="Plateau arbre">
      <div id="pions"></div>
      <div id="actionGrid"></div>
      <div id="flashTimer">30s</div>
    </div>

    <div id="controls">
      <button id="rollBtn" onclick="rollDice()" disabled>Lancer le dé</button>
      <div id="direction" style="display:none; margin:15px;">
        <button onclick="move('right')">DROITE →</button>
        <button onclick="move('left')">← GAUCHE</button>
      </div>
    </div>

    <div id="players"></div>

    <div id="question" style="display:none;">
      <h3 id="theme"></h3>
      <p id="qtext"></p>
      <input id="answer" type="text" placeholder="Ta réponse">
      <button onclick="sendAnswer()">Envoyer</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
