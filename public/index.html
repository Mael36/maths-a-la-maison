<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
  <h2>Créer / Rejoindre une partie</h2>

  <input id="playerName" placeholder="Pseudo"><br><br>

  <button id="createBtn">Créer une partie</button>
  <br><br>

  <input id="roomCode" placeholder="Code">
  <button id="joinBtn">Rejoindre</button>
</div>

<div id="game">
  <div id="topBar">
    <h3>Code : <span id="roomDisplay"></span></h3>
    <div id="scoreTable"></div>
  </div>

  <button id="startBtn">Démarrer la partie</button>

  <div id="diceZone">
    Résultat du dé : <span id="diceResult">-</span>
    <br>
    <button id="rollBtn" disabled>Lancer le dé</button>
  </div>

  <div id="plateauContainer">
    <img id="plateau" src="assets/plateau.png">
    <div id="pions"></div>
    <div id="possibleCases"></div>
  </div>

  <h3>Actions</h3>
  <div id="actionGrid"></div>

</div>

<!-- Question -->
<div id="questionBox">
  <h3 id="themeTitle"></h3>
  <div id="questionText"></div>
  <div id="timer"></div>

  <input id="answerInput" placeholder="Réponse">
  <button id="sendAnswerBtn">Valider</button>
</div>

<!-- Résultat -->
<div id="resultBox">
  <h3 id="resultText"></h3>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
