<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maths à la Maison</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="menu">
  <h1>Maths à la Maison</h1>
  <input type="text" id="playerName" placeholder="Ton prénom" value="Joueur">
  <button onclick="createRoom()">Créer une partie</button>
  <p>OU</p>
  <input type="text" id="roomCode" placeholder="Code (ex: ABCD)" maxlength="4">
  <button onclick="joinRoom()">Rejoindre</button>
</div>

<div id="game" style="display:none; padding:20px; text-align:center;">
  <h2>Salle : <span id="roomDisplay"></span></h2>
  <button id="startBtn">Démarrer la partie</button>

  <div id="boardContainer">
    <img src="assets/plateau.png" id="plateau" alt="Plateau">
    <div id="pions"></div>
    <div id="flashTimer">60s</div>
  </div>

  <div id="actionGrid"></div>

  <div id="controls">
    <button id="rollBtn" disabled>Lancer le dé</button>
    <div id="directions" style="display:none; margin:20px;">
      <button onclick="chooseDir('left')">GAUCHE</button>
      <button onclick="chooseDir('right')">DROITE</button>
    </div>
  </div>

  <div id="players"></div>

  <div id="questionBox" style="display:none;">
    <h3 id="themeTitle"></h3>
    <p id="questionText"></p>
    <div id="timerDisplay">Temps restant : <span id="countdown">60</span>s</div>
    <input type="text" id="answerInput" placeholder="Ta réponse">
    <button onclick="sendAnswer()">Envoyer</button>
  </div>

  <div id="timeUp" style="display:none; color:red; font-size:2em; margin:30px;">
    Temps écoulé !
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
