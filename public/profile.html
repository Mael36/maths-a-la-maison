<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mon Profil</h1>
    <button onclick="window.location.href='index.html'">Retour</button>
  </header>

  <main>
    <section id="change-password">
      <h2>Changer le mot de passe</h2>
      <form id="passwordForm">
        <input type="password" name="oldPassword" placeholder="Ancien mot de passe" required>
        <input type="password" name="newPassword" placeholder="Nouveau mot de passe" required>
        <button type="submit">Modifier</button>
      </form>
      <p id="msgPwd"></p>
    </section>
  </main>

  <script>
    const pwdForm = document.getElementById('passwordForm');
    pwdForm.addEventListener('submit', async e => {
      e.preventDefault();
      const data = {
        oldPassword: pwdForm.oldPassword.value,
        newPassword: pwdForm.newPassword.value
      };
      const res = await fetch('/api/change-password', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      const msg = document.getElementById('msgPwd');
      msg.textContent = result.success ? "Mot de passe modifié !" : (result.error || "Erreur");
      if(result.success) pwdForm.reset();
    });

    // Ici tu pourras récupérer les stats via socket.io ou API
  </script>
</body>
</html>
