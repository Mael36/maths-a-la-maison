<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="/usersState.js"></script>
</head>
<body>
<h2>Profil</h2>
<p>Utilisateur : <span id="profileUsername"></span></p>

<form id="changePasswordForm">
  <input type="password" id="oldPassword" placeholder="Ancien mot de passe" required>
  <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required>
  <button type="submit">Changer le mot de passe</button>
</form>

<button id="backBtn">Retour</button>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser) window.location.href = '/login.html';
document.getElementById('profileUsername').textContent = currentUser.username;

document.getElementById('changePasswordForm').addEventListener('submit', async e => {
  e.preventDefault();
  const oldPassword = document.getElementById('oldPassword').value;
  const newPassword = document.getElementById('newPassword').value;

  const ok = await changePassword(currentUser.username, oldPassword, newPassword);
  if (ok) alert('Mot de passe changé ✅');
  else alert('Ancien mot de passe incorrect ❌');
});

document.getElementById('backBtn').addEventListener('click', () => {
  if (currentUser.role === 'prof') window.location.href = '/prof.html';
  else window.location.href = '/index.html';
});
</script>
</body>
</html>
