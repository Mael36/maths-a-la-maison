<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page Prof</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="/usersState.js"></script>
</head>
<body>
<h2>Page Professeur</h2>
<p>Bienvenue, <span id="profUsername"></span></p>

<form id="createStudentForm">
  <input type="text" id="newUsername" placeholder="Nom élève" required>
  <input type="password" id="newPassword" placeholder="Mot de passe" required>
  <button type="submit">Créer élève</button>
</form>

<button id="logoutBtn">Déconnexion</button>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser) window.location.href = '/login.html';
if (currentUser.role !== 'prof') window.location.href = '/index.html';
document.getElementById('profUsername').textContent = currentUser.username;

document.getElementById('createStudentForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('newUsername').value;
  const password = document.getElementById('newPassword').value;

  if (Object.values(usersState).some(u => u.username === username)) {
    return alert('Utilisateur déjà existant');
  }

  await createUser(username, password, 'student');
  alert(`Élève "${username}" créé ✅`);
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('currentUser');
  window.location.href = '/login.html';
});
</script>
</body>
</html>
