<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="/usersState.js"></script>
</head>
<body>
<div class="login-container">
  <h2>Connexion</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Nom d'utilisateur" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  const user = Object.values(usersState).find(u => u.username === username);
  if (!user) return alert('Utilisateur inconnu');
  
  const ok = await dcodeIO.bcrypt.compare(password, user.passwordHash);
  if (!ok) return alert('Mot de passe incorrect');


  localStorage.setItem('currentUser', JSON.stringify({
    username: user.username,
    role: user.role
  }));

  if (user.role === 'prof') window.location.href = '/prof.html';
  else window.location.href = '/index.html';
});
</script>
</body>
</html>
